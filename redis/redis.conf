# Redis configuration for Stellar Privacy Analytics
# Optimized for service discovery and caching

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""

# Snapshotting
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Service discovery specific optimizations
# Service registry data TTL
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Health check data
list-max-ziplist-size -2
set-max-intset-entries 512

# Service mesh routing data
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Performance tuning
tcp-keepalive 300
timeout 0

# Security (for production)
# requirepass your-redis-password

# Client connections
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Memory usage optimization
jemalloc-bg-thread yes

# Service discovery specific settings
# Enable keyspace notifications for service events
notify-keyspace-events Ex

# Compression for larger service data
rdbcompression yes
