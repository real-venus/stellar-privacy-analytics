version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stellar-postgres
    environment:
      POSTGRES_DB: stellar_db
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - stellar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar -d stellar_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache and Service Discovery
  redis:
    image: redis:7-alpine
    container_name: stellar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - stellar-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stellar-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://stellar:password@postgres:5432/stellar_db
      - REDIS_URL=redis://redis:6379
      - SERVICE_HOST=backend
      - API_PORT=3001
      - METRICS_PORT=9090
      - AWS_REGION=us-east-1
    ports:
      - "3001:3001"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - stellar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Service Discovery Dashboard
  service-discovery-dashboard:
    build:
      context: ./service-discovery-dashboard
      dockerfile: Dockerfile
    container_name: stellar-service-discovery-dashboard
    environment:
      - REDIS_URL=redis://redis:6379
      - API_URL=http://backend:3001
    ports:
      - "3003:3000"
    depends_on:
      - backend
      - redis
    networks:
      - stellar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stellar-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - stellar-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: stellar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - stellar-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: stellar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - stellar-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: stellar-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - stellar-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  stellar-network:
    driver: bridge
