name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Code Quality, Type Checks & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm run setup

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check && cd contracts && npm run type-check

      - name: Run shared package tests
        run: cd shared && npm test

      - name: Run backend tests
        run: cd backend && npm test

      - name: Run contracts tests
        run: cd contracts && npm test

      - name: Build shared package
        run: cd shared && npm run build

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build service-discovery-dashboard
        run: cd service-discovery-dashboard && npm run build

      - name: Build docs
        run: cd docs && npm run build

      - name: Build contracts
        run: cd contracts && npm run build
