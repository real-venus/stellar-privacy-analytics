# ─────────────────────────────────────────────────────────────
#  Stellar Privacy Analytics — CI/CD Pipeline
#  All jobs always run on every push/PR to ensure full coverage.
#  Deploy only on push to main.
# ─────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  RUST_VERSION: '1.77.0'
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect changed paths ──────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      shared: ${{ steps.filter.outputs.shared }}
      service-discovery: ${{ steps.filter.outputs.service-discovery }}
      docs: ${{ steps.filter.outputs.docs }}
      rust-root: ${{ steps.filter.outputs.rust-root }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
            backend:
              - 'backend/**'
              - 'package.json'
            shared:
              - 'shared/**'
              - 'package.json'
            service-discovery:
              - 'service-discovery-dashboard/**'
            rust-root:
              - 'src/**'
              - 'Cargo.toml'
            rust:
              - 'src/**'
              - 'contracts/**'
              - 'backend/src/**/*.rs'
              - 'backend/Cargo.toml'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - '**/*.rs'
            docs:
              - 'docs/**'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'

  # ── Shared library ────────────────────────────────────────
  shared:
    name: Shared Library
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: shared/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test
      - run: npm run build
      - name: Cache shared dist
        uses: actions/cache@v4
        with:
          path: shared/dist
          key: shared-dist-${{ hashFiles('shared/src/**/*.ts', 'shared/tsconfig.json') }}

  # ── Frontend: lint, type-check, test, build ───────────────
  frontend:
    name: Frontend
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Restore shared dist cache
        id: shared-cache
        uses: actions/cache@v4
        with:
          path: shared/dist
          key: shared-dist-${{ hashFiles('shared/src/**/*.ts', 'shared/tsconfig.json') }}
      - name: Build shared from source (cache miss)
        if: steps.shared-cache.outputs.cache-hit != 'true'
        run: npm ci && npm run build
        working-directory: shared
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test
      - run: npm run build

  # ── Backend: lint, type-check, test, build ────────────────
  backend:
    name: Backend
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Restore shared dist cache
        id: shared-cache
        uses: actions/cache@v4
        with:
          path: shared/dist
          key: shared-dist-${{ hashFiles('shared/src/**/*.ts', 'shared/tsconfig.json') }}
      - name: Build shared from source (cache miss)
        if: steps.shared-cache.outputs.cache-hit != 'true'
        run: npm ci && npm run build
        working-directory: shared
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test
      - run: npm run build

  # ── Root Soroban Extras ──────────────────────────────────
  rust-extras:
    name: Rust Extras
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --check --manifest-path Cargo.toml
      - name: Clippy
        run: cargo clippy --all-targets --all-features --manifest-path Cargo.toml -- -D warnings
      - name: Test
        run: cargo test --manifest-path Cargo.toml
      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release --manifest-path Cargo.toml

  # ── Service Discovery Dashboard ──────────────────────────
  service-discovery:
    name: Service Discovery
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: service-discovery-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: service-discovery-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  # ── Documentation ────────────────────────────────────────
  docs:
    name: Documentation
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ── Deploy ───────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [frontend, backend, rust-extras, service-discovery, docs]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://stellar-analytics.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build Docker images
        run: docker compose -f docker-compose.yml build
      - name: Deploy services
        run: echo "Deploying Stellar Privacy Analytics to production..."
