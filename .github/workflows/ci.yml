# ─────────────────────────────────────────────────────────────
#  Stellar Privacy Analytics — CI/CD Pipeline
#  Path-filtered: each job triggers only on relevant changes.
#  On main/master/develop branches, all checks run regardless.
# ─────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect changed paths ──────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      contracts: ${{ steps.filter.outputs.contracts }}
      service-discovery: ${{ steps.filter.outputs.service-discovery }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'shared/src/**'
              - 'shared/package.json'
              - 'package.json'
            backend:
              - 'backend/**'
              - 'shared/src/**'
              - 'shared/package.json'
              - 'package.json'
            contracts:
              - 'contracts/**'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - '**/*.rs'
            service-discovery:
              - 'service-discovery-dashboard/**'
              - 'package.json'
            rust:
              - 'src/**'
              - 'contracts/**'
              - 'backend/src/**/*.rs'
              - 'backend/Cargo.toml'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - '**/*.rs'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'

  # ── Frontend: lint, type-check, test, build ───────────────
  frontend:
    name: Frontend
    needs: [changes]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.ci == 'true' ||
       (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Build (production bundle)
        run: npm run build

  # ── Build shared library (dependency for backend) ────────
  shared-build:
    name: Build Shared
    needs: [changes]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.backend == 'true' ||
       needs.changes.outputs.ci == 'true' ||
       (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: shared/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Cache shared dist
        uses: actions/cache@v4
        with:
          path: shared/dist
          key: shared-dist-${{ hashFiles('shared/src/**/*.ts', 'shared/tsconfig.json') }}

  backend:
    name: Backend
    needs: [changes, shared-build]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.backend == 'true' ||
       needs.changes.outputs.ci == 'true' ||
       (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Restore shared dist cache
        uses: actions/cache@v4
        with:
          path: shared/dist
          key: shared-dist-${{ hashFiles('shared/src/**/*.ts', 'shared/tsconfig.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.ci.json
      - name: Test
        run: npm test -- --testPathPattern=gateway
      - name: Build
        run: npx tsc -p tsconfig.ci.json

  # ── Smart Contracts (Rust/Soroban) ────────────────────────
  contracts:
    name: Contracts
    needs: [changes]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.contracts == 'true' ||
       needs.changes.outputs.rust == 'true' ||
       needs.changes.outputs.ci == 'true' ||
       (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
          cache-on-failure: true
      - name: Install npm dependencies
        run: npm ci
      - name: Lint TypeScript
        run: npm run lint
      - name: Type-check TypeScript
        run: npm run type-check
      - name: Format check (cargo fmt)
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test (Rust)
        run: cargo test
      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

  # ── Root Soroban Extras ──────────────────────────────────
  rust-extras:
    name: Rust Extras
    needs: [changes]
    if: |
      always() &&
      !cancelled() &&
       (needs.changes.outputs.rust == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: true
      - name: Format check (cargo fmt)
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test
      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

  # ── Service Discovery Dashboard ──────────────────────────
  service-discovery:
    name: Service Discovery
    needs: [changes]
    if: |
      always() &&
      !cancelled() &&
       (needs.changes.outputs.service-discovery == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: service-discovery-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: service-discovery-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build

  # ── Docs build (Next.js) ─────────────────────────────────
  docs:
    name: Documentation
    needs: [changes]
    if: |
      always() &&
      !cancelled() &&
       (needs.changes.outputs.ci == 'true' ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # ── Deploy (manual approval required) ─────────────────────
  deploy:
    name: Deploy
    needs: [frontend, backend, contracts, rust-extras, service-discovery, docs]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      ( github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' )
      && github.event_name == 'push'
    environment:
      name: production
      url: https://stellar-analytics.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and push Docker images
        run: |
          docker compose -f docker-compose.yml build
          echo "Images built. Push step would go here with docker compose push"
      - name: Deploy services to production
        run: |
          echo "Deploying Stellar Privacy Analytics to production..."
          echo "docker compose -f docker-compose.yml -f docker-compose.optimized.yml up -d"
