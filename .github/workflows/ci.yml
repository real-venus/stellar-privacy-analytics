# ─────────────────────────────────────────────────────────────
#  Stellar Privacy Analytics — CI/CD Pipeline
#  Jobs run sequentially to avoid redundant setup duplication.
#  Deploy requires manual approval via GitHub Environments.
# ─────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment target (only used when triggered manually)'
        type: choice
        options:
          - production
          - staging
        default: staging
        required: false

env:
  NODE_VERSION: '22'
  CARGO_TERM_COLOR: always

jobs:
  # ── Quality: lint, type-check, format, tests ──────────────
  # Combined into one job to avoid duplicating setup across
  # separate quality and test jobs.
  quality:
    name: Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm run setup

      - name: Format check
        run: npm run format:check

      - name: Lint (all packages)
        run: npm run lint

      - name: Type-check (all packages)
        run: npm run type-check

      - name: Rust format check
        run: cd contracts && cargo fmt --check

      - name: Rust clippy
        run: cd contracts && cargo clippy -- -D warnings

      - name: Run tests (all packages)
        run: npm test

  # ── Build all packages ────────────────────────────────────
  build:
    name: Build
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm run setup

      - name: Build all packages
        run: npm run build

  # ── Deploy (manual approval required) ─────────────────────
  # On push to main → deploys to production (with approval gate).
  # On workflow_dispatch → deploys to the user-selected environment.
  # The `environment:` block enforces that a user with the
  # required GitHub Environment protection rule (required
  # reviewers) must approve before this runs.
  deploy:
    name: Deploy
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      ( github.ref == 'refs/heads/main' && github.event_name == 'push' )
      || github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_env || 'production' }}
      url: https://stellar-analytics.example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm run setup

      - name: Build and push Docker images
        run: |
          docker compose -f docker-compose.yml build
          echo "Images built. Push step would go here with docker compose push"

      - name: Deploy services to ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_env || 'production' }}
        run: |
          TARGET=${{ github.event_name == 'workflow_dispatch' && inputs.deploy_env || 'production' }}
          echo "Deploying Stellar Privacy Analytics to $TARGET..."
          echo "docker compose -f docker-compose.yml -f docker-compose.optimized.yml up -d"
          echo "(Configure $TARGET credentials in GitHub Environment secrets)"
